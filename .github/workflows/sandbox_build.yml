name: sandbox build

on:
  push:
    branches:
      - sandbox

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v2

      - name: Set up JDK 11
        uses: actions/setup-java@v2
        with:
          java-version: '11'
          distribution: 'adopt'

      - name: Restore cache for Gradle
        uses: actions/cache@v2
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Configure version.
        id: config_version
        run: |
          echo ::set-output name=GLOBAL::$(cat ./_version.yml | grep -e '^global: [0-9]*\.[0-9]*\.[0-9]*$' | sed -e 's/global: //g')

      - name: Build documents with Gradle
        run: |
          # Generate dokka html documents with Gradle.
          chmod +x gradlew
          ./gradlew dokkaHtml --no-daemon
          # Update docs directory.
          rm -fr ./docs/*
          cp -r ./frextensions/build/dokka/html/* ./docs
          sed -i -E "/^\s*<h1.*<\/h1>$/s/frextensions/FRExtensions v${{ steps.config_version.outputs.GLOBAL }}/g" ./docs/index.html

      - name: Add commit
        uses: EndBug/add-and-commit@v7
        with:
          add: './docs'
          message: "Auto commit from GitHub Actions. v${{ steps.config_version.outputs.GLOBAL }}"
