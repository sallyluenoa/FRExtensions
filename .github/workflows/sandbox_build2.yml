name: sandbox build

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v2

      - name: Configure version.
        id: config_version
        run: |
          echo ::set-output name=GLOBAL::$(cat ./_version.yml | grep -e '^global: [0-9]*\.[0-9]*\.[0-9]*$' | sed -e 's/global: //g')

      - name: Test command.
        run: |
          echo "Current version is v${{ steps.config_version.outputs.GLOBAL }}"
